<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Live2D 最小示例</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a1a;
    }
    #live2d-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="live2d-canvas"></canvas>

  <!-- 1. PixiJS v6（浏览器版本） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.0.2/browser/pixi.min.js"></script>

  <!-- 2. Cubism 4 Core（Live2D 运行时） -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

  <!-- 3. pixi-live2d-display（支持 Cubism 3/4 的版本） -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

  <script>
    // 4. 使用 CDN 后，PIXI.live2d.Live2DModel 已经可用
    const { Live2DModel } = PIXI.live2d;

    async function main() {
      // 5. 创建 PixiJS Application
      const app = new PIXI.Application({
        view: document.getElementById('live2d-canvas'),
        resizeTo: window,
        backgroundAlpha: 0,
      });

      // 6. 加载你的 Live2D 模型（Cubism 4）
      const model = await Live2DModel.from('../../atri_8/atri_8.model3.json', {
        autoInteract: true, // 自动：眼睛跟随鼠标、点击命中检测
      });

      // 7. 放到舞台中央，并缩放
      model.anchor.set(0.5, 0.5);
      model.scale.set(0.3); // 根据你的模型大小调整
      model.x = app.screen.width / 2;
      model.y = app.screen.height / 2;

      app.stage.addChild(model);

      // 8. （可选）点击身体时播放指定动作
      model.on('hit', (hitAreas) => {
        if (hitAreas.includes('body')) {
          model.motion('tap_body'); // 动作名以你的模型为准
        }
      });
    }

    main().catch(console.error);
  </script>
</body>
</html>
